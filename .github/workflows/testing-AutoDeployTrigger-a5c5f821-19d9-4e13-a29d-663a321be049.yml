name: Trigger auto deployment for testing

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/testing-AutoDeployTrigger-a5c5f821-19d9-4e13-a29d-663a321be049.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TESTING_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TESTING_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TESTING_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: bibash.azurecr.io
          registryUsername: ${{ secrets.TESTING_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TESTING_REGISTRY_PASSWORD }}
          containerAppName: testing
          resourceGroup: Bibash_Check
          imageToBuild: bibash.azurecr.io/testing:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


